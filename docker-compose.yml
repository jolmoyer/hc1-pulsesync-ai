version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulsesync_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pulsesync:pulsesync@db:5432/pulsesync
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app   # hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pulsesync_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pulsesync:pulsesync@db:5432/pulsesync
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.workers.worker
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: pulsesync_db
    environment:
      POSTGRES_USER: pulsesync
      POSTGRES_PASSWORD: pulsesync
      POSTGRES_DB: pulsesync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsesync -d pulsesync"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pulsesync_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
